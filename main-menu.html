<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Menu</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container py-5">
        <h1 class="text-center mb-4">ISOFH TESTING TOOL - ITT</h1>
        <div class="row">
            <!-- Left Column: List of Cards -->
            <div class="col-md-6">
                <ul class="list-group">
                    <li class="list-group-item">
                        <h5 class="mb-1">Tạo dữ liệu QMS</h5>
                        <a href="module/batchCls/batch-cls.html" class="btn btn-primary">Go to Batch CLS</a>
                    </li>
                    <li class="list-group-item">
                        <h5 class="mb-1">Demo kết quả LIS</h5>
                        <a href="module/LisORU/OmlToOru.html" class="btn btn-primary">Go to LIS ORU</a>
                    </li>
                    <li class="list-group-item">
                        <h5 class="mb-1">Tool biên bản nghiệm thu</h5>
                        <a href="module/ToolTaoBienBan/TaoBienBan.html" class="btn btn-primary">Go to Tool Biên Bản</a>
                    </li>
                </ul>
            </div>

            <!-- Right Column: Login Form -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title text-center">Đặng nhập</h5>
                        <form>
                            <div class="mb-3">
                                <label for="serverUrl" class="form-label">Server Link</label>
                                <input type="text" class="form-control" id="serverUrl" placeholder="Enter server URL">
                            </div>
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" placeholder="Enter username">
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" placeholder="Enter password">
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">Get token</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
