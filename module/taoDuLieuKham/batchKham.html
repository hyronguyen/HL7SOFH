<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QMS Tool</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }

        .card {
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        textarea {
            font-family: monospace;
            font-size: 13px;
        }

        .form-check {
            padding-top: 6px;
        }
    </style>
</head>

<body>
    <div class="container py-5">

        <!-- Header -->
        <div class="text-center mb-4">
            <h3 class="fw-bold">QMS - Tạo dữ liệu Khám</h3>
            <p class="text-muted mb-0">Công cụ test tự động HIS</p>
        </div>

        <!-- Card -->
        <div class="card p-4">

            <!-- Form -->
            <div class="row g-3 align-items-end">

                <!-- Loop -->
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Số lần chạy</label>
                    <input type="number" id="loopCount" class="form-control" min="1" placeholder="Nhập số lần">
                </div>

                <!-- Checkbox group -->
                <div class="col-md-4">
                    <label class="form-label fw-semibold d-block">Tùy chọn</label>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="keThuocCheckBox">
                        <label class="form-check-label" for="keThuocCheckBox">
                            Kê thuốc
                        </label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="baoHiemCheckBox">
                        <label class="form-check-label" for="baoHiemCheckBox">
                            Bảo hiểm
                        </label>
                    </div>
                     <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="clsCheckBox">
                        <label class="form-check-label" for="clsCheckBox">
                            Kê CLS
                        </label>
                    </div>
                </div>

                <!-- Dịch vụ khám -->
                <div class="col-md-6 position-relative">
                    <label class="form-label fw-semibold">Chọn dịch vụ khám</label>
                    <input type="text" id="dichVuKhamSearch" class="form-control" placeholder="Nhập tên dịch vụ...">
                    <ul id="dichVuKhamDropdown" class="list-group position-absolute w-100"
                        style="z-index: 1000; max-height: 200px; overflow-y: auto; display: none;"></ul>
                </div>

                <!-- Phòng khám -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Chọn phòng khám</label>
                    <select id="phongKhamSelect" class="form-select">
                        <option value="">-- Chọn phòng --</option>
                        <option value="157">Phòng khám số 1</option>
                        <option value="158">Phòng khám số 2</option>
                        <option value="159">Phòng khám số 3</option>
                    </select>
                </div>

                <div class="col-md-6 position-relative">
                    <label class="form-label fw-semibold">Chọn kê CLS</label>
                    <input type="text" id="dichvuCls" class="form-control" placeholder="Nhập tên dịch vụ...">
                    <ul id="dichVuKhamDropdown" class="list-group position-absolute w-100"
                        style="z-index: 1000; max-height: 200px; overflow-y: auto; display: none;"></ul>
                </div>

                <!-- Button -->
                <div class="col-md-4 d-grid">
                    <button class="btn btn-primary btn-lg" onclick="runLoop()">
                        ▶ Bắt đầu chạy
                    </button>
                </div>



            </div>

            <!-- Output -->
            <div class="mt-4">
                <label class="form-label fw-semibold">Log hệ thống</label>
                <textarea id="output" class="form-control" rows="12" readonly
                    placeholder="Kết quả sẽ hiển thị ở đây..."></textarea>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="batchKham.js"></script>
</body>

</html>
