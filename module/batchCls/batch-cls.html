<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loop Input</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container py-5">
        <h1 class="text-center mb-4">Tạo dữ liệu QMS CLS</h1>
       <div class="row mb-3"> 
         <div class="col-3">
            <label for="loopCount" class="form-label">Lần lặp:</label>
            <input type="number" id="loopCount" class="form-control" min="1">
        </div>
       </div>

      
        <div class="d-grid gap-2 mb-3">
            <button class="btn btn-primary" onclick="runLoop()">Bắt đầu</button>
        </div>
        <div class="mb-3">
            <textarea id="output" class="form-control" rows="10" readonly></textarea>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="test.js"></script>
</body>

</html>
