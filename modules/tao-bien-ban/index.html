<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tạo Biên Bản Công Việc</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 30px;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      padding-bottom: 20px;
      border-bottom: 3px solid #3498db;
    }
    
    h1 {
      color: #2c3e50;
      margin: 0;
      font-size: 28px;
      font-weight: 700;
    }
    
    .btn-back {
      background: #3498db;
      color: white;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    
    .btn-back:hover {
      color: white;
      text-decoration: none;
      background: #2980b9;
      box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
    }
    
    .upload-section {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 6px;
      align-items: center;
      flex-wrap: wrap;
    }
    
    #fileInput {
      padding: 10px 15px;
      border: 2px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
      flex: 1;
      max-width: 400px;
      min-width: 200px;
    }
    
    button {
      padding: 12px 25px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    
    button:hover {
      background: #2980b9;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(52, 152, 219, 0.3);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
    }
    
    td, th {
      border: 1px solid #ddd;
      padding: 12px;
      vertical-align: top;
      text-align: left;
    }
    
    th {
      background: #34495e;
      color: white;
      font-weight: 600;
      width: 60px;
    }
    
    tr:nth-child(even) {
      background: #f9f9f9;
    }
    
    tr:hover {
      background: #f0f4f8;
    }
    
    .date {
      font-weight: 700;
      color: #e74c3c;
      font-size: 15px;
      margin-bottom: 12px;
      padding: 8px 12px;
      background: #fef5f5;
      border-left: 3px solid #e74c3c;
      display: inline-block;
      border-radius: 3px;
    }
    
    .section-title {
      font-weight: 700;
      color: #2c3e50;
      font-size: 14px;
      margin: 15px 0 8px 0;
    }
    
    ul {
      margin: 8px 0 12px 20px;
      padding: 0;
    }
    
    li {
      margin-bottom: 8px;
      line-height: 1.6;
      color: #333;
    }
    
    li b {
      color: #2c3e50;
    }
    
    a {
      color: #3498db;
      text-decoration: none;
    }
    
    a:hover {
      text-decoration: underline;
      color: #2980b9;
    }
    
    .jira-link {
      display: inline-block;
      padding: 4px 8px;
      background: #ecf0f1;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
    }
    
    /* Format styles */
    .code-inline {
      background: #f4f4f4;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
      color: #c7254e;
    }
    
    .code-block {
      background: #282c34;
      color: #abb2bf;
      padding: 12px;
      border-radius: 4px;
      overflow-x: auto;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      margin: 8px 0;
    }
    
    .note {
      padding: 10px 12px;
      background: #fff3cd;
      border-left: 3px solid #ffc107;
      border-radius: 3px;
      margin: 8px 0;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📋 Tạo Biên Bản Công Việc</h1>
    <a href="../../" class="btn-back">← Quay lại</a>
  </div>
  
  <div class="upload-section">
    <input type="file" id="fileInput" accept=".csv" placeholder="Chọn file CSV..." />
    <button onclick="copyTable()">📋 Copy Bảng</button>
  </div>

  <div id="output"></div>
</div>

<script>

// ===== Parse CSV =====
document.getElementById("fileInput").addEventListener("change", function(e) {
  const file = e.target.files[0];

  Papa.parse(file, {
    header: true,
    skipEmptyLines: true,
    encoding: "UTF-8",
    complete: function(results) {

      const data = results.data.map(row => ({
        summary: (row["Summary"] || "").trim(),
        issue: (row["Issue key"] || "").trim(),
        description: (row["Description"] || "").trim(),
        rawDate: (row["Date"] || "").trim(),
        dateObj: parseDate(row["Date"])
      }));

      const grouped = groupByDate(data);
      renderTable(grouped);
    }
  });
});

// ===== Parse dd/MM hoặc dd/MM/yyyy =====
function parseDate(str) {
  if (!str) return null;

  const parts = str.split("/");

  if (parts.length === 2) {
    // dd/MM → fix năm (bắt buộc phải có)
    return new Date(2026, parts[1] - 1, parts[0]);
  }

  if (parts.length === 3) {
    return new Date(parts[2], parts[1] - 1, parts[0]);
  }

  return new Date(str);
}

// ===== Group theo ngày (giữ cả rawDate + dateObj) =====
function groupByDate(data) {
  const map = {};

  data.forEach(item => {
    if (!item.rawDate) return;

    if (!map[item.rawDate]) {
      map[item.rawDate] = {
        dateObj: item.dateObj,
        items: []
      };
    }

    map[item.rawDate].items.push(item);
  });

  return map;
}

// ===== Render + SORT CHUẨN =====
function renderTable(grouped) {

  let html = `
    <table>
      <tr>
        <th>STT</th>
        <th>Nội dung</th>
      </tr>
  `;

  let stt = 1;

  Object.entries(grouped)
    .sort((a, b) => a[1].dateObj - b[1].dateObj) // 🔥 SORT CHUẨN
    .forEach(([date, group]) => {

      html += `
        <tr>
          <td>${stt++}</td>
          <td>
            <div class="date">📅 ${date}</div>
            <div class="section-title">✓ Nội dung công việc:</div>
            <ul>
      `;

      group.items.forEach(item => {
        html += `
          <li>
            <b>${escapeHTML(item.summary)}</b><br/>
            <small>${formatDesc(item.description)}</small>
          </li>
        `;
      });

      html += `
            </ul>
            <div class="section-title">🔗 Minh chứng (Jira):</div>
            <ul>
      `;

      group.items.forEach(item => {
        html += `
          <li>
            <a href="https://jira.isofh.com.vn/browse/${item.issue}" class="jira-link">
              ${item.issue}
            </a>
          </li>
        `;
      });

      html += `
            </ul>
          </td>
        </tr>
      `;
    });

  html += `</table>`;
  document.getElementById("output").innerHTML = html;
}

// ===== Format description theo Jira Markup =====
function formatDesc(desc) {
  if (!desc) return "";
  
  let html = escapeHTML(desc);
  
  // Xử lý code block ```...``` trước (để tránh xung đột với * và **)
  html = html.replace(/```([^`]+)```/g, '<div class="code-block">$1</div>');
  
  // Bold **text** → <strong>text</strong>
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  
  // Italic *text* hoặc _text_ → <em>text</em>
  html = html.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  html = html.replace(/_([^_\n]+)_/g, '<em>$1</em>');
  
  // Inline code `text` → <code>text</code>
  html = html.replace(/`([^`]+)`/g, '<code class="code-inline">$1</code>');
  
  // Heading h1. h2. h3. → <h3>, <h4>, <h5>
  html = html.replace(/^h1\.\s+(.+)$/gm, '<h3 style="margin-top: 12px; margin-bottom: 6px; color: #2c3e50;">$1</h3>');
  html = html.replace(/^h2\.\s+(.+)$/gm, '<h4 style="margin-top: 10px; margin-bottom: 5px; color: #34495e;">$1</h4>');
  html = html.replace(/^h3\.\s+(.+)$/gm, '<h5 style="margin-top: 8px; margin-bottom: 4px; color: #7f8c8d;">$1</h5>');
  
  // Links [text|url] → <a href="url">text</a>
  html = html.replace(/\[([^\|]+)\|([^\]]+)\]/g, '<a href="$2">$1</a>');
  
  // Links [text](url) → <a href="url">text</a>
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  
  // Lists: - item hoặc * item sẽ được giữ nguyên (HTML sẽ xử lý)
  // NOTE: Chuyển dòng thành <br/> cuối cùng
  html = html.replace(/\n/g, '<br/>');
  
  return html;
}

// ===== Escape HTML =====
function escapeHTML(str) {
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

// ===== Copy =====
function copyTable() {
  const output = document.getElementById("output");

  if (!output.innerHTML.trim()) {
    alert("⚠️ Chưa có dữ liệu. Vui lòng upload file CSV.");
    return;
  }

  const range = document.createRange();
  range.selectNode(output);

  const selection = window.getSelection();
  selection.removeAllRanges();
  selection.addRange(range);

  document.execCommand("copy");
  selection.removeAllRanges();

  alert("✅ Đã copy bảng. Dán vào Word là dùng được.");
}

</script>

</body>
</html>
