<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tạo Biên Bản Công Việc</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    
    body {
      font-family: 'Calibri', 'Times New Roman', serif;
      margin: 0;
      padding: 15px;
      background: #f0f0f0;
      min-height: 100vh;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      padding: 40px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }
    
    h1 {
      color: #000;
      margin: 0 0 30px 0;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      width: 100%;
      text-transform: uppercase;
    }
    
    .btn-back {
      background: #3498db;
      color: white;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 3px;
      font-weight: 600;
      font-size: 12px;
      transition: all 0.3s ease;
    }
    
    .btn-back:hover {
      color: white;
      text-decoration: none;
      background: #2980b9;
    }
    
    .upload-section {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
      padding: 12px;
      background: #f5f5f5;
      border: 1px solid #ddd;
      align-items: center;
      flex-wrap: wrap;
    }
    
    #fileInput {
      padding: 8px 10px;
      border: 1px solid #ccc;
      cursor: pointer;
      flex: 1;
      min-width: 250px;
      font-size: 13px;
    }
    
    button {
      padding: 8px 15px;
      background: #3498db;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    
    button:hover {
      background: #2980b9;
    }
    
    button:active {
      transform: translateY(0);
    }
    
    /* Form Info Section */
    .form-info {
      margin-bottom: 25px;
      border: 1px solid #000;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid #000;
    }
    
    .form-row:last-child {
      border-bottom: none;
    }
    
    .form-field {
      padding: 8px 10px;
      border-right: 1px solid #000;
      font-size: 13px;
      line-height: 1.5;
    }
    
    .form-field:last-child {
      border-right: none;
    }
    
    .form-label {
      font-weight: bold;
      color: #000;
      font-size: 13px;
    }
    
    .form-value {
      margin-top: 3px;
      color: #333;
      min-height: 20px;
    }
    
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
      font-size: 13px;
      border: 1px solid #000;
    }
    
    td, th {
      border: 1px solid #000;
      padding: 8px 10px;
      vertical-align: top;
      text-align: left;
    }
    
    th {
      background: #d9d9d9;
      color: #000;
      font-weight: bold;
      text-align: center;
    }
    
    th:first-child {
      width: 50px;
      text-align: center;
    }
    
    th:last-child {
      width: 80px;
      text-align: center;
    }
    
    td:last-child {
      width: 80px;
      text-align: center;
      font-weight: bold;
    }
    
    tr:nth-child(even) {
      background: #fff;
    }
    
    .date {
      font-weight: bold;
      color: #000;
      font-size: 13px;
      margin-bottom: 10px;
      display: block;
    }
    
    .section-title {
      font-weight: bold;
      color: #000;
      font-size: 13px;
      margin: 12px 0 8px 0;
      font-style: italic;
    }
    
    ul {
      margin: 5px 0 8px 20px;
      padding: 0;
    }
    
    li {
      margin-bottom: 5px;
      line-height: 1.4;
      color: #000;
      font-size: 13px;
    }
    
    li b {
      color: #000;
      font-weight: bold;
    }
    
    a {
      color: #0563c1;
      text-decoration: underline;
      font-size: 12px;
    }
    
    a:hover {
      text-decoration: underline;
      color: #0563c1;
    }
    
    .jira-link {
      display: inline-block;
      padding: 2px 4px;
      background: transparent;
      border-radius: 0;
      font-family: 'Courier New', monospace;
      font-size: 12px;
    }
    
    /* Format styles */
    .code-inline {
      background: #f0f0f0;
      padding: 1px 3px;
      border-radius: 0;
      font-family: 'Courier New', monospace;
      color: #c7254e;
      font-size: 12px;
    }
    
    .code-block {
      background: #f0f0f0;
      color: #000;
      padding: 8px;
      border-radius: 0;
      overflow-x: auto;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      margin: 5px 0;
      border: 1px solid #ddd;
    }
    
    .note {
      padding: 8px 10px;
      background: #fffacd;
      border-left: 2px solid #ffc107;
      border-radius: 0;
      margin: 5px 0;
      font-size: 12px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <a href="../../" class="btn-back">← Quay lại</a>
  </div>
  
  <h1>BIÊN BẢN CÔNG VIỆC</h1>
  
  <div class="upload-section">
    <input type="file" id="fileInput" accept=".csv" placeholder="Chọn file CSV..." />
    <button onclick="copyTable()">📋 Copy Bảng</button>
  </div>
  
  <div id="output"></div>
</div>

<script>

// ===== Extract Jira Tickets from text (QLYC- and SAKURA- only) =====
function extractJiraTickets(text) {
  if (!text) return [];
  const regex = /(QLYC-\d+|SAKURA-\d+)/g;
  const matches = text.match(regex) || [];
  return [...new Set(matches)]; // Remove duplicates
}

// ===== Parse CSV =====
document.getElementById("fileInput").addEventListener("change", function(e) {
  const file = e.target.files[0];

  Papa.parse(file, {
    header: true,
    skipEmptyLines: true,
    encoding: "UTF-8",
    complete: function(results) {

      const data = results.data.map(row => {
        const description = (row["Description"] || "").trim();
        const extractedTickets = extractJiraTickets(description);
        
        return {
          summary: (row["Summary"] || "").trim(),
          issue: (row["Issue key"] || "").trim(),
          description: description,
          extractedTickets: extractedTickets,
          rawDate: (row["Date"] || "").trim(),
          dateObj: parseDate(row["Date"])
        };
      });

      const grouped = groupByDate(data);
      renderTable(grouped);
    }
  });
});

// ===== Parse MM/DD hoặc MM/DD/yyyy =====
function parseDate(str) {
  if (!str) return null;

  const parts = str.split("/");

  if (parts.length === 2) {
    // MM/DD → fix năm (bắt buộc phải có)
    return new Date(2026, parts[0] - 1, parts[1]);
  }

  if (parts.length === 3) {
    return new Date(parts[2], parts[0] - 1, parts[1]);
  }

  return new Date(str);
}

// ===== Group theo ngày (giữ cả rawDate + dateObj) =====
function groupByDate(data) {
  const map = {};

  data.forEach(item => {
    if (!item.rawDate) return;

    if (!map[item.rawDate]) {
      map[item.rawDate] = {
        dateObj: item.dateObj,
        items: []
      };
    }

    map[item.rawDate].items.push(item);
  });

  return map;
}

// ===== Render + SORT CHUẨN =====
function renderTable(grouped) {

  let html = `
    
    <table>
      <tr>
        <th>STT</th>
        <th>Nội dung công việc</th>
        <th>Thời gian</th>
      </tr>
  `;

  let stt = 1;

  Object.entries(grouped)
    .sort((a, b) => a[1].dateObj - b[1].dateObj) // 🔥 SORT CHUẨN
    .forEach(([date, group]) => {

      html += `
        <tr>
          <td style="text-align: center; vertical-align: middle; font-weight: bold;">${stt++}</td>
          <td>
            <div class="date">Ngày ${date}</div>
            <ul>
      `;

      group.items.forEach(item => {
        html += `
          <li>
            <b>${escapeHTML(item.summary)}</b><br/>
            <small>${formatDesc(item.description, item.extractedTickets)}</small>
          </li>
        `;
      });

      html += `
            </ul>
            <div class="section-title">Dưới đây là minh chứng cho các việc em đã làm được trong ngày hôm này được thể hiện trên Jira: </div>
            <ul>
      `;

      group.items.forEach(item => {
        // Combine main issue with extracted tickets from description
        const allTickets = [item.issue, ...item.extractedTickets].filter(t => t);
        
        allTickets.forEach(ticket => {
          html += `
            <li>
              <a href="https://jira.isofh.com.vn/browse/${ticket}" class="jira-link">
                https://jira.isofh.com.vn/browse/${ticket}
              </a>
            </li>
          `;
        });
      });

      html += `
            </ul>
          </td>
          <td style="text-align: center; vertical-align: middle; font-weight: bold;">8.5</td>
        </tr>
      `;
    });

  html += `</table>`;
  document.getElementById("output").innerHTML = html;
}

// ===== Format description theo Jira Markup =====
function formatDesc(desc, extractedTickets = []) {
  if (!desc) return "";
  
  let html = escapeHTML(desc);
  
  // Remove extracted Jira tickets from description
  if (extractedTickets && extractedTickets.length > 0) {
    extractedTickets.forEach(ticket => {
      // Remove ticket with surrounding whitespace
      html = html.replace(new RegExp('\\s*' + ticket.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\s*', 'g'), ' ');
    });
    html = html.trim();
  }
  
  // Xử lý code block ```...``` trước (để tránh xung đột với * và **)
  html = html.replace(/```([^`]+)```/g, '<div class="code-block">$1</div>');
  
  // Bold **text** → <strong>text</strong>
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  
  // Italic *text* hoặc _text_ → <em>text</em>
  html = html.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  html = html.replace(/_([^_\n]+)_/g, '<em>$1</em>');
  
  // Inline code `text` → <code>text</code>
  html = html.replace(/`([^`]+)`/g, '<code class="code-inline">$1</code>');
  
  // Color {color:#HEX}text{color} → <span style="color:#HEX">text</span>
  html = html.replace(/\{color:([^}]+)\}([^{]+)\{color\}/g, '<span style="color:$1">$2</span>');
  
  // Heading h1. h2. h3. → <h3>, <h4>, <h5>
  html = html.replace(/^h1\.\s+(.+)$/gm, '<h3 style="margin-top: 12px; margin-bottom: 6px; color: #2c3e50;">$1</h3>');
  html = html.replace(/^h2\.\s+(.+)$/gm, '<h4 style="margin-top: 10px; margin-bottom: 5px; color: #34495e;">$1</h4>');
  html = html.replace(/^h3\.\s+(.+)$/gm, '<h5 style="margin-top: 8px; margin-bottom: 4px; color: #7f8c8d;">$1</h5>');
  
  // Links [text|url] → <a href="url">text</a>
  html = html.replace(/\[([^\|]+)\|([^\]]+)\]/g, '<a href="$2">$1</a>');
  
  // Links [text](url) → <a href="url">text</a>
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  
  // Limit line breaks: xóa dòng trống, chỉ giữ 1 <br/> giữa các dòng
  html = html.replace(/\n\s*\n+/g, '<br/>');
  html = html.replace(/\n/g, '<br/>');
  
  return html;
}

// ===== Escape HTML =====
function escapeHTML(str) {
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

// ===== Copy =====
function copyTable() {
  const output = document.getElementById("output");

  if (!output.innerHTML.trim()) {
    alert("⚠️ Chưa có dữ liệu. Vui lòng upload file CSV.");
    return;
  }

  const range = document.createRange();
  range.selectNode(output);

  const selection = window.getSelection();
  selection.removeAllRanges();
  selection.addRange(range);

  document.execCommand("copy");
  selection.removeAllRanges();

  alert("✅ Đã copy bảng. Dán vào Word là dùng được.");
}

</script>

</body>
</html>
