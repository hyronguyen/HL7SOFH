<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo dữ liệu QMS CLS</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            margin-top: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #667eea;
        }
        h1 {
            color: #667eea;
            font-weight: 700;
            margin: 0;
        }
        .btn-back {
            background: #667eea;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
        }
        .btn-back:hover {
            color: white;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        .form-label {
            font-weight: 600;
            color: #333;
        }
        .btn-primary {
            background: #667eea;
            border: none;
        }
        .btn-primary:hover {
            background: #764ba2;
        }
        textarea {
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>📊 Tạo dữ liệu QMS CLS</h1>
            <a href="../../" class="btn-back">← Quay lại</a>
        </div>

        <div class="row">
            <div class="col-md-4">
                <label for="loopCount" class="form-label">Số lần lặp:</label>
                <input type="number" id="loopCount" class="form-control" min="1" value="1">
            </div>
        </div>

        <div class="d-grid gap-2 mt-4 mb-3">
            <button class="btn btn-primary btn-lg" onclick="runLoop()">Bắt đầu</button>
        </div>
        
        <div class="mb-3">
            <label for="output" class="form-label">Kết quả:</label>
            <textarea id="output" class="form-control" rows="15" readonly placeholder="Kết quả sẽ hiển thị ở đây..."></textarea>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./test.js"></script>
</body>

</html>
